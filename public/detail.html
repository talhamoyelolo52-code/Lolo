<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Build Details - MC Plugin Compiler Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d4ff;
            --secondary: #00ff88;
            --accent: #ff6b6b;
            --bg: #0a0a1a;
            --bg-light: #12122a;
            --card: rgba(255,255,255,0.03);
            --card-border: rgba(255,255,255,0.08);
            --text: #e0e0ff;
            --text-dim: #8892b0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        .bg-animation {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 30% 30%, rgba(0,212,255,0.04) 0%, transparent 50%),
                        radial-gradient(circle at 70% 70%, rgba(0,255,136,0.03) 0%, transparent 50%);
        }

        /* Navbar */
        .navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10,10,26,0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--card-border);
            padding: 0 30px;
        }

        .nav-inner {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            -webkit-text-fill-color: initial;
        }

        .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 500;
            font-size: 15px;
            transition: all 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary);
            background: rgba(0,212,255,0.08);
        }

        /* Container */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-dim);
            text-decoration: none;
            margin-bottom: 30px;
            font-size: 15px;
            padding: 10px 20px;
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            transition: all 0.3s;
        }

        .back-link:hover {
            color: var(--primary);
            border-color: var(--primary);
            background: rgba(0,212,255,0.05);
        }

        /* Status Banner */
        .status-banner {
            border-radius: 24px;
            padding: 40px;
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status-banner.success {
            background: linear-gradient(135deg, rgba(0,255,136,0.1), rgba(0,255,136,0.02));
            border: 1px solid rgba(0,255,136,0.2);
        }

        .status-banner.failed {
            background: linear-gradient(135deg, rgba(255,107,107,0.1), rgba(255,107,107,0.02));
            border: 1px solid rgba(255,107,107,0.2);
        }

        .status-banner::before {
            content: '';
            position: absolute;
            top: -50%; right: -20%;
            width: 400px; height: 400px;
            border-radius: 50%;
            opacity: 0.1;
        }

        .status-banner.success::before {
            background: radial-gradient(circle, var(--secondary), transparent);
        }

        .status-banner.failed::before {
            background: radial-gradient(circle, var(--accent), transparent);
        }

        .status-content {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .status-emoji {
            font-size: 64px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .status-text h1 {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .status-banner.success .status-text h1 { color: var(--secondary); }
        .status-banner.failed .status-text h1 { color: var(--accent); }

        .status-text p {
            color: var(--text-dim);
            font-size: 17px;
        }

        /* Info Cards */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }

        .info-card {
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s;
        }

        .info-card:hover {
            border-color: rgba(0,212,255,0.15);
            transform: translateY(-3px);
        }

        .info-label {
            color: var(--text-dim);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .info-value {
            font-size: 16px;
            font-weight: 600;
            word-break: break-all;
            line-height: 1.4;
        }

        .info-value.success { color: var(--secondary); }
        .info-value.failed { color: var(--accent); }

        /* Actions */
        .actions {
            display: flex;
            gap: 12px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 15px;
            text-decoration: none;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }

        .btn:hover { transform: translateY(-2px); }

        .btn-green {
            background: var(--secondary);
            color: #0a0a1a;
            box-shadow: 0 10px 30px rgba(0,255,136,0.2);
        }

        .btn-green:hover {
            box-shadow: 0 15px 40px rgba(0,255,136,0.3);
        }

        .btn-blue {
            background: linear-gradient(135deg, var(--primary), #0099cc);
            color: #fff;
            box-shadow: 0 10px 30px rgba(0,212,255,0.2);
        }

        .btn-outline {
            background: var(--card);
            border: 1px solid var(--card-border);
            color: var(--text);
        }

        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* Logs Section */
        .logs-section {
            margin-top: 20px;
        }

        .logs-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .logs-header h2 {
            font-size: 22px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .copy-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--card);
            border: 1px solid var(--card-border);
            color: var(--text-dim);
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .copy-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .copy-btn.copied {
            background: rgba(0,255,136,0.1);
            border-color: var(--secondary);
            color: var(--secondary);
        }

        .logs-container {
            background: #050510;
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 28px;
            max-height: 600px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.8;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .logs-container::-webkit-scrollbar {
            width: 6px;
        }

        .logs-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .logs-container::-webkit-scrollbar-thumb {
            background: var(--card-border);
            border-radius: 3px;
        }

        /* Syntax highlighting */
        .log-error { color: var(--accent); background: rgba(255,107,107,0.05); padding: 2px 4px; border-radius: 4px; }
        .log-success { color: var(--secondary); background: rgba(0,255,136,0.05); padding: 2px 4px; border-radius: 4px; }
        .log-warn { color: #ffaa00; background: rgba(255,170,0,0.05); padding: 2px 4px; border-radius: 4px; }
        .log-info { color: var(--primary); }
        .log-path { color: #a78bfa; }
        .log-time { color: #555; }

        /* Loading */
        .loading-state {
            text-align: center;
            padding: 120px 20px;
        }

        .loading-spinner {
            width: 60px; height: 60px;
            border: 4px solid var(--card-border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 24px;
        }

        .loading-state p {
            color: var(--text-dim);
            font-size: 18px;
        }

        /* Not Found */
        .not-found {
            text-align: center;
            padding: 120px 20px;
        }

        .not-found-icon {
            font-size: 80px;
            margin-bottom: 24px;
            opacity: 0.5;
        }

        .not-found h2 {
            font-size: 28px;
            margin-bottom: 12px;
        }

        .not-found p {
            color: var(--text-dim);
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .status-content { flex-direction: column; text-align: center; }
            .actions { justify-content: center; }
            .info-grid { grid-template-columns: 1fr; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>

    <nav class="navbar">
        <div class="nav-inner">
            <a href="/" class="logo">
                <div class="logo-icon">⚡</div>
                MC Plugin Compiler
            </a>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/compiler">Compiler</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <a href="/compiler" class="back-link">
            <span>←</span> Back to Compiler
        </a>

        <div id="content">
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <p>Loading build details...</p>
            </div>
        </div>
    </div>

    <script>
        const buildId = window.location.pathname.split('/').pop();

        async function loadBuildDetails() {
            const content = document.getElementById('content');

            try {
                const res = await fetch(`/api/build/${buildId}`);
                const data = await res.json();

                if (!data.success) {
                    content.innerHTML = `
                        <div class="not-found">
                            <div class="not-found-icon">🔍</div>
                            <h2>Build Not Found</h2>
                            <p>This build may have been deleted or never existed.</p>
                            <a href="/compiler" class="btn btn-blue">Go to Compiler</a>
                        </div>
                    `;
                    return;
                }

                const build = data.build;
                const isSuccess = build.status === 'success';
                const date = new Date(build.timestamp);

                // Format logs with syntax highlighting
                let formattedLogs = escapeHtml(build.logs || 'No logs available');
                formattedLogs = formattedLogs
                    .replace(/(ERROR|FAILED|Exception|error|failed|cannot|Could not)/gi, '<span class="log-error">$1</span>')
                    .replace(/(BUILD SUCCESS|SUCCESS|successful|UP-TO-DATE|BUILD)/gi, '<span class="log-success">$1</span>')
                    .replace(/(WARNING|WARN|deprecated)/gi, '<span class="log-warn">$1</span>')
                    .replace(/(\/[^\s]+)/g, '<span class="log-path">$1</span>');

                content.innerHTML = `
                    <div class="status-banner ${isSuccess ? 'success' : 'failed'}">
                        <div class="status-content">
                            <div class="status-emoji">${isSuccess ? '🎉' : '💥'}</div>
                            <div class="status-text">
                                <h1>${isSuccess ? 'Build Successful' : 'Build Failed'}</h1>
                                <p>${build.filename}</p>
                            </div>
                        </div>
                    </div>

                    <div class="info-grid">
                        <div class="info-card">
                            <div class="info-label">Build ID</div>
                            <div class="info-value">${build.id.substring(0, 12)}...</div>
                        </div>
                        <div class="info-card">
                            <div class="info-label">Build Type</div>
                            <div class="info-value">${build.buildType}</div>
                        </div>
                        <div class="info-card">
                            <div class="info-label">Date & Time</div>
                            <div class="info-value">${date.toLocaleString()}</div>
                        </div>
                        <div class="info-card">
                            <div class="info-label">Duration</div>
                            <div class="info-value">${build.buildTime ? (build.buildTime/1000).toFixed(2) + 's' : 'N/A'}</div>
                        </div>
                        <div class="info-card">
                            <div class="info-label">Status</div>
                            <div class="info-value ${isSuccess ? 'success' : 'failed'}">
                                ${isSuccess ? '✅ Success' : '❌ Failed'}
                            </div>
                        </div>
                        ${build.jarName ? `
                        <div class="info-card">
                            <div class="info-label">Output File</div>
                            <div class="info-value">${build.jarName}</div>
                        </div>
                        ` : ''}
                    </div>

                    <div class="actions">
                        ${build.downloadUrl ? `
                            <a href="${build.downloadUrl}" class="btn btn-green" download>
                                <span>⬇️</span> Download JAR
                            </a>
                        ` : ''}
                        <a href="/compiler" class="btn btn-blue">
                            <span>🚀</span> New Build
                        </a>
                        <button class="btn btn-outline" onclick="copyLogs(this)">
                            <span>📋</span> Copy Logs
                        </button>
                    </div>

                    <div class="logs-section">
                        <div class="logs-header">
                            <h2><span>📝</span> Full Build Logs</h2>
                            <button class="copy-btn" onclick="copyLogs(this)">
                                <span>📋</span> Copy
                            </button>
                        </div>
                        <div class="logs-container" id="logsContainer">${formattedLogs}</div>
                    </div>
                `;

            } catch(e) {
                content.innerHTML = `
                    <div class="not-found">
                        <div class="not-found-icon">⚠️</div>
                        <h2>Error Loading Build</h2>
                        <p>${e.message}</p>
                        <a href="/compiler" class="btn btn-blue">Go to Compiler</a>
                    </div>
                `;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function copyLogs(btn) {
            const logs = document.getElementById('logsContainer').textContent;
            navigator.clipboard.writeText(logs).then(() => {
                const original = btn.innerHTML;
                btn.innerHTML = '<span>✅</span> Copied!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.innerHTML = original;
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        loadBuildDetails();
    </script>
</body>
</html>
